# Deploys to GitHub Pages with the Mapbox token baked into config.js (reliable for CI).
# config.secret.js is gitignored — a generated copy was easy to miss in the Pages bundle.
#
# Setup:
# 1. Settings → Secrets and variables → Actions → New repository secret
#    Name: MAPBOX_TOKEN   Value: your Mapbox public default token (paste trimmed, no quotes)
# 2. Settings → Pages → Build and deployment → Source: GitHub Actions (not "Deploy from a branch")
# 3. After the workflow succeeds, open the site URL from the workflow run (env: github-pages),
#    usually https://<user>.github.io/<repo>/
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use Node 24 for JavaScript-based actions (see GitHub deprecation of Node 20 runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Inject Mapbox token into config.js
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const token = (process.env.MAPBOX_TOKEN || "").trim();
          if (!token) {
            console.error(
              "::error::MAPBOX_TOKEN is empty. Add repository secret MAPBOX_TOKEN under Settings → Secrets and variables → Actions (exact name, no spaces)."
            );
            process.exit(1);
          }
          let src = fs.readFileSync("config.js", "utf8");
          if (!/mapboxAccessToken:\s*""/.test(src)) {
            console.error(
              "::error::config.js must keep mapboxAccessToken: \"\" so CI can inject the token."
            );
            process.exit(1);
          }
          src = src.replace(
            /mapboxAccessToken:\s*""/,
            "mapboxAccessToken: " + JSON.stringify(token)
          );
          fs.writeFileSync("config.js", src);
          NODE

      - uses: actions/configure-pages@v6

      # Pin patch: major tag `v5` is not always published; v5.0.0 is on the registry.
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5
