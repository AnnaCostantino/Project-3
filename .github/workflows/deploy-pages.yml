# Builds a deploy bundle with config.secret.js so the map works on GitHub Pages.
# 1. Repo → Settings → Secrets and variables → Actions → New repository secret:
#    Name: MAPBOX_TOKEN   Value: your Mapbox public default token
# 2. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write config.secret.js for deploy
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const token = process.env.MAPBOX_TOKEN || "";
          const body =
            "(function () {\n" +
            "  var base = window.FUEL_FINDER_CONFIG || {};\n" +
            "  window.FUEL_FINDER_CONFIG = Object.assign({}, base, {\n" +
            "    mapboxAccessToken: " +
            JSON.stringify(token) +
            ",\n" +
            "  });\n" +
            "})();\n";
          fs.writeFileSync("config.secret.js", body);
          NODE

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
